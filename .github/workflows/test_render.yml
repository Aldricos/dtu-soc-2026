name: Test Render & Viewer

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pdk: ["sky130A", "sky130B"]
    steps:
      - uses: actions/checkout@v4

      - name: Find latest run with successful hardening job
        id: last_run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Walk recent runs and pick the first one where the hardening job
          # for this PDK succeeded (even if other jobs like precheck failed)
          RUN_ID=""
          for id in $(gh run list --workflow="Hardening & Precheck" \
              --limit=30 --json databaseId --jq '.[].databaseId'); do
            status=$(gh run view "$id" --json jobs \
              --jq '.jobs[] | select(.name == "hardening (${{ matrix.pdk }})") | .conclusion')
            if [ "$status" = "success" ]; then
              RUN_ID=$id
              break
            fi
          done
          if [ -z "$RUN_ID" ]; then
            echo "No run with successful hardening job for ${{ matrix.pdk }}"
            exit 1
          fi
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Using run ID: $RUN_ID"

      - name: Download hardened design
        uses: actions/download-artifact@v4
        with:
          name: design-${{ matrix.pdk }}
          path: ${{ github.workspace }}
          run-id: ${{ steps.last_run.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Render GDS layouts
        run: |
          sudo apt-get install -y librsvg2-bin pngquant
          pip3 install --quiet gdstk klayout
          mkdir -p renders
          for gds in gds/*.gds; do
            name=$(basename "$gds" .gds)
            python3 .github/scripts/render_gds.py "$gds" "renders/${name}.png" || true
            python3 .github/scripts/gds_to_oas.py "$gds" "renders/${name}.oas" "${{ matrix.pdk }}" || true
          done
          ls -la renders/

      - name: Upload Renders
        uses: actions/upload-artifact@v4
        with:
          name: renders-${{ matrix.pdk }}
          path: ${{ github.workspace }}/renders/
          retention-days: 14

  viewer:
    runs-on: ubuntu-latest
    needs: [render]
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Download Renders (sky130A)
        uses: actions/download-artifact@v4
        with:
          name: renders-sky130A
          path: gh-pages/

      - name: Generate viewer redirect
        run: |
          cat > gh-pages/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="X-UA-Compatible" content="IE=edge">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Redirecting to 3D Viewer...</title>
          </head>
          <body>
            <script>
              location.href = "https://gds-viewer.tinytapeout.com/?pdk=sky130A&model=" + encodeURIComponent(location.href + '/CaravelUserProject.oas');
            </script>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Display viewer in summary
        run: |
          PAGE_URL=${{ steps.deploy.outputs.page_url }}
          PAGE_URL=$(echo "$PAGE_URL" | sed -e 's/\/$//')
          cat << EOF >> $GITHUB_STEP_SUMMARY
          ## 3D Viewer
          [Open 3D viewer](https://gds-viewer.tinytapeout.com/?pdk=sky130A&model=${PAGE_URL}/CaravelUserProject.oas)

          ## 2D Preview
          ![CaravelUserProject](${PAGE_URL}/CaravelUserProject.png)
          EOF
