name: Hardening

on:
  workflow_run:
    workflows: ["Scalatest CI"]
    types: [completed]
  workflow_dispatch:

jobs:
  hardening:
    timeout-minutes: 720
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        pdk: ["sky130A", "sky130B"]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Download generated Verilog
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v4
        with:
          name: generated-verilog
          path: verilog/rtl/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find latest Scalatest CI run (manual dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        id: scalatest_run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID=""
          for id in $(gh run list --workflow="Scalatest CI" \
              --limit=30 --json databaseId --jq '.[].databaseId'); do
            conclusion=$(gh run view "$id" --json conclusion --jq '.conclusion')
            if [ "$conclusion" = "success" ]; then
              RUN_ID=$id
              break
            fi
          done
          if [ -z "$RUN_ID" ]; then
            echo "No successful Scalatest CI run found" >&2
            exit 1
          fi
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Download generated Verilog (manual dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/download-artifact@v4
        with:
          name: generated-verilog
          path: verilog/rtl/
          run-id: ${{ steps.scalatest_run.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            substituters = https://cache.nixos.org https://nix-cache.fossi-foundation.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-cache.fossi-foundation.org:3+K59iFwXqKsL7BNu6Guy0v+uTlwsxYQxjspXzqLYQs=

      - name: Install ChipFoundry CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip python3-venv python3-tk
          pip3 install chipfoundry-cli

      - name: Initialize Project
        run: |
          mkdir -p .cf
          python3 <<EOF
          import json
          import os
          from pathlib import Path

          project_name = os.path.basename(os.getcwd())
          project_json = Path('.cf/project.json')

          data = {
              "project": {
                  "name": project_name,
                  "type": "digital",
                  "user": "chipfoundry",
                  "version": "1.0.0",
                  "user_project_wrapper_hash": "",
                  "submission_state": "Draft"
              }
          }

          with open(project_json, 'w') as f:
              json.dump(data, f, indent=2)
          EOF

      - name: Setup Dependencies
        run: |
          cf setup --pdk ${{ matrix.pdk }} --only-openlane --only-pdk

      - name: Harden Designs
        run: |
          set -e
          python3 .github/scripts/get_designs.py --design ${{ github.workspace }}
          for design in $(cat harden_sequence.txt); do
            cf harden --use-nix $design && status=0 || status=$?
            python3 .github/scripts/hardening_summary.py $design $status
            if [ $status -ne 0 ]; then exit $status; fi
          done

      - name: Upload Run Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hardening-logs-${{ matrix.pdk }}
          path: ${{ github.workspace }}/runs/
          retention-days: 7

      - name: Upload Hardened Design
        uses: actions/upload-artifact@v4
        with:
          name: design-${{ matrix.pdk }}
          path: |
            ${{ github.workspace }}/gds
            ${{ github.workspace }}/lef
            ${{ github.workspace }}/def
            ${{ github.workspace }}/verilog/gl
            ${{ github.workspace }}/signoff
            ${{ github.workspace }}/.cf/project.json
          retention-days: 14

  trigger-precheck:
    runs-on: ubuntu-latest
    needs: [hardening]
    # Fires precheck.yml as an independent workflow run as soon as
    # hardening finishes — its pass/fail status is separate from this
    # workflow, and it runs in parallel with the viewer job.
    if: ${{ success() }}
    permissions:
      actions: write
    steps:
      - name: Dispatch Precheck workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # gh workflow run / the workflow_dispatch API requires a branch or
          # tag name in --ref, not a commit SHA, so we pass head_branch on
          # workflow_run and ref_name on manual dispatch.
          gh workflow run precheck.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ github.event.workflow_run.head_branch || github.ref_name }}" \
            --field hardening_run_id=${{ github.run_id }} \
            --field head_sha="${{ github.event.workflow_run.head_sha || github.sha }}"

  viewer:
    runs-on: ubuntu-latest
    needs: [hardening]
    if: ${{ success() }}
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Download Hardened Design (sky130A)
        uses: actions/download-artifact@v4
        with:
          name: design-sky130A
          path: ${{ github.workspace }}

      - name: Render GDS to OAS
        # 2D PNG rendering is intentionally disabled: both rsvg-convert and
        # cairosvg paths fail on this design (too many cells) and only burn
        # CI minutes. We keep the OAS conversion which feeds the 3D viewer.
        run: |
          pip3 install --quiet klayout
          mkdir -p gh-pages
          for gds in gds/*.gds; do
            name=$(basename "$gds" .gds)
            python3 .github/scripts/gds_to_oas.py "$gds" "gh-pages/${name}.oas" sky130A || true
          done
          ls -la gh-pages/

      - name: Generate viewer redirect
        run: |
          cat > gh-pages/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="X-UA-Compatible" content="IE=edge">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Redirecting to 3D Viewer...</title>
          </head>
          <body>
            <script>
              location.href = "https://gds-viewer.tinytapeout.com/?pdk=sky130A&model=" + encodeURIComponent(location.href + '/CaravelUserProject.oas');
            </script>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Display viewer in summary
        run: |
          PAGE_URL=${{ steps.deploy.outputs.page_url }}
          PAGE_URL=$(echo "$PAGE_URL" | sed -e 's/\/$//')
          cat << EOF >> $GITHUB_STEP_SUMMARY
          ## 3D Viewer
          [Open 3D viewer](https://gds-viewer.tinytapeout.com/?pdk=sky130A&model=${PAGE_URL}/CaravelUserProject.oas)
          EOF
