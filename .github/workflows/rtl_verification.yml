name: RTL Verification

on:
  workflow_run:
    workflows: ["Scalatest CI"]
    types: [completed]

jobs:
  rtl-verification:
    name: Verify CaravelUserProject
    timeout-minutes: 720
    runs-on: ubuntu-latest
    # Only run if the Scalatest CI workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    strategy:
      matrix:
        pdk: ["sky130A", "sky130B"]

    steps:
      - uses: actions/checkout@v4

      # Download the Verilog generated by the Scalatest CI workflow
      - name: Download generated Verilog
        uses: actions/download-artifact@v4
        with:
          name: generated-verilog
          path: verilog/rtl/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Install ChipFoundry CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip python3-venv
          pip3 install chipfoundry-cli

      - name: Initialize Project
        run: |
          mkdir -p .cf
          python3 <<EOF
          import json
          import os
          from pathlib import Path
          
          project_name = os.path.basename(os.getcwd())
          project_json = Path('.cf/project.json')
          
          data = {
              "project": {
                  "name": project_name,
                  "type": "digital",
                  "user": "chipfoundry",
                  "version": "1.0.0",
                  "user_project_wrapper_hash": "",
                  "submission_state": "Draft"
              }
          }
          
          with open(project_json, 'w') as f:
              json.dump(data, f, indent=2)
          EOF

      - name: Setup Dependencies
        run: |
          cf setup --pdk ${{ matrix.pdk }} --only-caravel --only-mcw --only-pdk --only-cocotb

      - name: Configure GPIO (non-interactive)
        run: |
          python3 <<EOF
          import json
          from pathlib import Path
          
          project_json = Path('.cf/project.json')
          with open(project_json) as f:
              data = json.load(f)
          
          # Set default GPIO config (all as user input no pull)
          gpio_config = {}
          for gpio in range(5, 38):
              gpio_config[str(gpio)] = "13'h0402"  # GPIO_MODE_USER_STD_INPUT_NOPULL
          
          data['project']['gpio_config'] = gpio_config
          
          with open(project_json, 'w') as f:
              json.dump(data, f, indent=2)
          EOF

      - name: Run RTL Verification
        run: |
          cf verify --all 
