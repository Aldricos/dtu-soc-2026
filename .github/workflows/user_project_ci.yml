name: Hardening & Precheck

on:
  workflow_run:
    workflows: ["Scalatest CI"]
    types: [completed]

jobs:
  hardening:
    timeout-minutes: 720
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    strategy:
      matrix:
        pdk: ["sky130A", "sky130B"]
    steps:
      - uses: actions/checkout@v4

      - name: Download generated Verilog
        uses: actions/download-artifact@v4
        with:
          name: generated-verilog
          path: verilog/rtl/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            substituters = https://cache.nixos.org https://nix-cache.fossi-foundation.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-cache.fossi-foundation.org:3+K59iFwXqKsL7BNu6Guy0v+uTlwsxYQxjspXzqLYQs=

      - name: Install ChipFoundry CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip python3-venv python3-tk
          pip3 install chipfoundry-cli

      - name: Initialize Project
        run: |
          mkdir -p .cf
          python3 <<EOF
          import json
          import os
          from pathlib import Path

          project_name = os.path.basename(os.getcwd())
          project_json = Path('.cf/project.json')

          data = {
              "project": {
                  "name": project_name,
                  "type": "digital",
                  "user": "chipfoundry",
                  "version": "1.0.0",
                  "user_project_wrapper_hash": "",
                  "submission_state": "Draft"
              }
          }

          with open(project_json, 'w') as f:
              json.dump(data, f, indent=2)
          EOF

      - name: Setup Dependencies
        run: |
          cf setup --pdk ${{ matrix.pdk }} --only-openlane --only-pdk

      - name: Harden Designs
        run: |
          set -e
          python3 .github/scripts/get_designs.py --design ${{ github.workspace }}
          for design in $(cat harden_sequence.txt); do
            cf harden --use-nix $design && status=0 || status=$?
            python3 .github/scripts/hardening_summary.py $design $status
            if [ $status -ne 0 ]; then exit $status; fi
          done

      - name: Render GDS layouts
        if: success()
        run: |
          sudo apt-get install -y klayout
          mkdir -p renders
          LYP_FILE=$(find dependencies/pdks -name "${{ matrix.pdk }}.lyp" | head -1)
          for gds in gds/*.gds; do
            name=$(basename "$gds" .gds)
            python3 .github/scripts/render_gds.py "$gds" "renders/${name}.png" "$LYP_FILE" || true
            python3 -c "
          import klayout.db as db
          ly = db.Layout()
          ly.read('$gds')
          ly.write('renders/${name}.oas')
          " || true
          done

      - name: Upload Renders
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: renders-${{ matrix.pdk }}
          path: ${{ github.workspace }}/renders/
          retention-days: 14

      - name: Upload Run Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hardening-logs-${{ matrix.pdk }}
          path: ${{ github.workspace }}/runs/
          retention-days: 7

      - name: Upload Hardened Design
        uses: actions/upload-artifact@v4
        with:
          name: design-${{ matrix.pdk }}
          path: |
            ${{ github.workspace }}/gds
            ${{ github.workspace }}/lef
            ${{ github.workspace }}/def
            ${{ github.workspace }}/verilog/gl
            ${{ github.workspace }}/signoff
            ${{ github.workspace }}/.cf/project.json
          retention-days: 1

  viewer:
    runs-on: ubuntu-latest
    needs: [hardening]
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Download Renders (sky130A)
        uses: actions/download-artifact@v4
        with:
          name: renders-sky130A
          path: gh-pages/

      - name: Generate viewer redirect
        run: |
          cat > gh-pages/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="X-UA-Compatible" content="IE=edge">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Redirecting to 3D Viewer...</title>
          </head>
          <body>
            <script>
              location.href = "https://gds-viewer.tinytapeout.com/?pdk=sky130A&model=" + encodeURIComponent(location.href + '/CaravelUserProject.oas');
            </script>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Display viewer in summary
        run: |
          PAGE_URL=${{ steps.deploy.outputs.page_url }}
          PAGE_URL=$(echo "$PAGE_URL" | sed -e 's/\/$//')
          cat << EOF >> $GITHUB_STEP_SUMMARY
          ## 3D Viewer
          [Open 3D viewer](https://gds-viewer.tinytapeout.com/?pdk=sky130A&model=${PAGE_URL}/CaravelUserProject.oas)

          ## 2D Preview
          ![CaravelUserProject](${PAGE_URL}/CaravelUserProject.png)
          EOF

  precheck:
    timeout-minutes: 720
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    strategy:
      matrix:
        pdk: ["sky130A", "sky130B"]
    needs: [hardening]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Install ChipFoundry CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip
          pip3 install chipfoundry-cli

      - name: Initialize Project
        run: |
          mkdir -p .cf
          python3 <<EOF
          import json
          import os
          from pathlib import Path

          project_name = os.path.basename(os.getcwd())
          project_json = Path('.cf/project.json')

          data = {
              "pdk": "${{ matrix.pdk }}",
              "project": {
                  "name": project_name,
                  "type": "digital",
                  "user": "chipfoundry",
                  "version": "1.0.0",
                  "user_project_wrapper_hash": "",
                  "submission_state": "Draft"
              }
          }

          with open(project_json, 'w') as f:
              json.dump(data, f, indent=2)
          EOF

      - name: Setup Dependencies
        run: |
          cf setup --pdk ${{ matrix.pdk }} --only-pdk --only-precheck

      - name: Download Hardened Design
        uses: actions/download-artifact@v4
        with:
          name: design-${{ matrix.pdk }}
          path: ${{ github.workspace }}

      - name: Configure GPIO (non-interactive)
        run: |
          python3 <<EOF
          import json
          from pathlib import Path

          project_json = Path('.cf/project.json')
          with open(project_json) as f:
              data = json.load(f)

          # Set default GPIO config (all as user input no pull)
          gpio_config = {}
          for gpio in range(5, 38):
              gpio_config[str(gpio)] = "13'h0402"  # GPIO_MODE_USER_STD_INPUT_NOPULL

          data['project']['gpio_config'] = gpio_config

          with open(project_json, 'w') as f:
              json.dump(data, f, indent=2)
          EOF

      - name: Run Precheck
        run: |
          cf precheck
