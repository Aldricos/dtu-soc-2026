name: LibreLane Synthesis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  synthesis:
    name: Synthesise CaravelTop
    runs-on: ubuntu-latest

    steps:
      # 1. Download the repo onto the runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install Nix on the runner (with flakes enabled)
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      # 3. Run LibreLane synthesis directly via nix run – no shell entry needed
      #    --from-step Yosys --to-step Yosys runs synthesis only (fast, ~5 min)
      - name: Run synthesis
        run: |
          nix run github:librelane/librelane -- \
            --pdk-root ~/.volare \
            --pdk sky130A \
            --flow Classic \
            --from-step Yosys \
            --to-step Yosys \
            openlane/CaravelTop/config.json

      # 4. Upload logs and reports even if synthesis failed
      - name: Upload synthesis results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synthesis-results-${{ github.sha }}
          path: runs/
          retention-days: 14