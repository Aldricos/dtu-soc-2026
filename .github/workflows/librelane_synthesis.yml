name: LibreLane Synthesis

on:
  workflow_run:
    workflows: ["Scalatest CI"]
    types: [completed]

jobs:
  synthesis:
    name: Synthesise CaravelTop
    runs-on: ubuntu-latest
    # Only run if the Scalatest CI workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Download the Verilog generated by the Scalatest CI workflow
      - name: Download generated Verilog
        uses: actions/download-artifact@v4
        with:
          name: generated-verilog
          path: verilog/rtl/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            substituters = https://cache.nixos.org https://openlane.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= openlane.cachix.org-1:qqdwh+QMNGmZAuyeQJTH9ErW57OWSvdtuwfBKdS254E=

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-librelane-2.4.13-${{ runner.os }}
          restore-keys: nix-librelane-

      - name: Run synthesis
        run: |
          nix run github:librelane/librelane -- \
            "$(pwd)/openlane/CaravelTop/config.json"

      - name: Upload synthesis results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synthesis-results-${{ github.sha }}
          path: runs/
          retention-days: 14