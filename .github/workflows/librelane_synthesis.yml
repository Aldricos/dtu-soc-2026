name: LibreLane Synthesis

on:
  workflow_run:
    workflows: ["Scalatest CI"]
    types: [completed]

jobs:
  synthesis:
    name: Synthesise CaravelUserProject
    runs-on: ubuntu-latest
    # Only run if the Scalatest CI workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # Download the Verilog generated by the Scalatest CI workflow
      - name: Download generated Verilog
        uses: actions/download-artifact@v4
        with:
          name: generated-verilog
          path: verilog/rtl/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            substituters = https://cache.nixos.org https://nix-cache.fossi-foundation.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-cache.fossi-foundation.org:3+K59iFwXqKsL7BNu6Guy0v+uTlwsxYQxjspXzqLYQs=

      - name: Run synthesis
        run: |
          nix run github:librelane/librelane -- \
            "$(pwd)/openlane/CaravelUserProject/config.json"

      - name: Upload synthesis results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synthesis-results-${{ github.sha }}
          path: runs/
          retention-days: 14